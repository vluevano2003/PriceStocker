spring.application.name=PriceStocker

# --- CONFIGURACIÓN DE BASE DE DATOS ---
# Esto creará la base de datos en: C:\Users\NombreUsuario\PriceStockerData\pricestocker_db
spring.datasource.url=jdbc:h2:file:${user.home}/PriceStockerData/pricestocker_db;AUTO_SERVER=TRUE

spring.datasource.username=admin
spring.datasource.password=1234
spring.datasource.driver-class-name=org.h2.Driver

# --- CONFIGURACIÓN JPA / HIBERNATE ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate

# --- CONFIGURACIÓN FLYWAY ---
spring.flyway.enabled=true
# Esto permite que si la DB ya existe sin historial de Flyway, cree la base (útil para la primera vez)
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration