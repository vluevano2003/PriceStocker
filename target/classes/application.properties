spring.application.name=PriceStocker

spring.datasource.url=jdbc:h2:file:./data/pricestocker_db

spring.datasource.username=admin
spring.datasource.password=1234
spring.datasource.driver-class-name=org.h2.Driver

# --- CONFIGURACIÓN JPA / HIBERNATE ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Flyway se encarga de las tablas, así que JPA solo valida
spring.jpa.hibernate.ddl-auto=validate

# --- CONFIGURACIÓN FLYWAY ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# Esto ayuda a que Flyway no se confunda con esquemas
spring.flyway.locations=classpath:db/migration